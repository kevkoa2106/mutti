name: Build

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config

      - name: Install chafa
        run: |
          curl -L -o chafa.tar.gz https://hpjansson.org/chafa/releases/static/chafa-1.18.1-1-x86_64-linux-gnu.tar.gz
          tar xzf chafa.tar.gz
          sudo cp chafa-1.18.1-1-x86_64-linux-gnu/bin/chafa /usr/local/bin/
          sudo cp chafa-1.18.1-1-x86_64-linux-gnu/lib/pkgconfig/chafa.pc /usr/local/lib/pkgconfig/
          sudo cp -r chafa-1.18.1-1-x86_64-linux-gnu/include/* /usr/local/include/
          sudo cp chafa-1.18.1-1-x86_64-linux-gnu/lib/libchafa.a /usr/local/lib/
          echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
          pkg-config --modversion chafa

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mutti-linux-x86_64
          path: target/release/mutti

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install chafa
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://hpjansson.org/chafa/releases/static/chafa-1.18.1-1-x86_64-windows.zip" -OutFile chafa.zip
          Expand-Archive -Path chafa.zip -DestinationPath chafa
          $chafaDir = "$PWD\chafa\chafa-1.18.1-1-x86_64-windows"
          echo "$chafaDir\bin" >> $env:GITHUB_PATH
          echo "PKG_CONFIG_PATH=$chafaDir\lib\pkgconfig" >> $env:GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mutti-windows-x86_64
          path: target/release/mutti.exe
