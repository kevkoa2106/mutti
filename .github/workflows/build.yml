name: Build

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config

      - name: Install chafa
        run: |
          curl -fL -o libchafa0.deb https://launchpad.net/ubuntu/+archive/primary/+files/libchafa0t64_1.18.1-1_amd64.deb
          curl -fL -o libchafa-dev.deb https://launchpad.net/ubuntu/+archive/primary/+files/libchafa-dev_1.18.1-1_amd64.deb
          sudo apt-get install -y ./libchafa0.deb ./libchafa-dev.deb
          pkg-config --modversion chafa

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mutti-linux-x86_64
          path: target/release/mutti

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pkg-config
        shell: pwsh
        run: choco install pkgconfiglite -y

      - name: Install chafa
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://hpjansson.org/chafa/releases/static/chafa-1.18.1-1-x86_64-windows.zip" -OutFile chafa.zip
          Expand-Archive -Path chafa.zip -DestinationPath chafa
          $chafaDir = "$PWD\chafa\chafa-1.18.1-1-x86_64-windows"
          echo "$chafaDir\bin" >> $env:GITHUB_PATH
          echo "PKG_CONFIG_PATH=chafa/chafa-1.18.1-1-x86_64-windows/lib/pkgconfig" >> $env:GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mutti-windows-x86_64
          path: target/release/mutti.exe
